<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <title>Fertilizer Details</title>
  </head>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;600;700&display=swap");

    :root {
      --red: #008116;
    }

    * {
      font-family: "Nunito", sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      outline: none;
      border: none;
      text-decoration: none;
      transition: all 0.2s linear;
    }

    *::selection {
      background: var(--red);
      color: #fff;
    }

    html {
      font-size: 62.5%;
      overflow-x: hidden;
      scroll-behavior: smooth;
      scroll-padding-top: 6rem;
    }

    body {
      background: #f7f7f7;
    }

    .btn {
      display: inline-block;
      padding: 0.8rem 3rem;
      border: 0.2rem solid var(--red);
      color: var(--red);
      cursor: pointer;
      font-size: 1.7rem;
      border-radius: 0.5rem;
      position: relative;
      overflow: hidden;
      z-index: 0;
      margin-top: 1rem;
    }

    .btn:hover {
      color: #fff;
      background-color: #2bc570;
    }

    .heading {
      text-align: center;
      font-size: 3.5rem;
      padding: 1rem;
      color: #666;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      padding: 2rem 9%;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
    }

    header .logo {
      font-size: 2.5rem;
      font-weight: bolder;
      color: #666;
    }

    header .logo i {
      padding-right: 0.5rem;
      color: var(--red);
    }

    header .navbar a {
      font-size: 2rem;
      margin-left: 2rem;
      color: #666;
    }

    header .navbar a:hover {
      color: var(--red);
    }

    #menu-bar {
      font-size: 3rem;
      cursor: pointer;
      color: rgb(62, 204, 7);
      border: 0.1rem solid #666;
      border-radius: 0.3rem;
      padding: 0.5rem 1.5rem;
      display: none;
    }

    @media (max-width: 768px) {
      #menu-bar {
        display: initial;
      }

      header .navbar {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: rgb(225, 248, 227);
        border-top: 0.1rem solid rgba(0, 0, 0, 0.1);
        clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
      }

      header .navbar.active {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
      }

      header .navbar a {
        margin: 1.5rem;
        padding: 1.5rem 2rem;
        display: block;
        border: 0.2rem solid rgba(0, 0, 0, 0.1);
        border-left: 0.5rem solid var(--red);
      }
    }

    section {
      padding: 2rem 9%;
    }

    .plants_and_their_info .charts img {
      width: 100%;
      max-width: 700px;
      margin: 20px auto;
      display: block;
      box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
    }
  </style>

  <body>
    <header>
      <a href="{{ url_for('home') }}" class="logo"><i class="fas fa-seedling"></i>Ferti</a>
      <div id="menu-bar" class="fas fa-bars"></div>
      <nav class="navbar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('fertilizer_recommendation') }}">Model</a>
      </nav>
    </header>

    <section class="home">
      <h1 class="heading">Fertilizer Recommendation System</h1>

      <div class="plants_and_their_info">
        <p>
          The Fertilizer Recommendation System is a smart agricultural tool
          designed to help farmers make informed decisions about fertilizers.
        </p>

        <h1>N (Nitrogen)</h1>
        <p>Nitrogen is really important for plant growth and chlorophyll.</p>

        <div class="charts">
          <img src="{{ url_for('static', filename='images/o1.png') }}">
          <img src="{{ url_for('static', filename='images/o2.png') }}">
          <img src="{{ url_for('static', filename='images/o3.png') }}">
          <img src="{{ url_for('static', filename='images/o4.png') }}">
        </div>
      </div>
    </section>
  </body>
</html>
